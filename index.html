<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Fitness Command Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="portal-body">
    <div class="container portal-container">
        <header class="portal-header">
            <h1>Fitness Blueprint Command Portal</h1>
            <p>Authentication Required. Select a profile and enter the secure authorization key.</p>
        </header>
        
        <div class="portal-grid">
            <!-- Vaibhav Card -->
            <div class="profile-card bulking">
                <h2>Vaibhav</h2>
                <span class="badge badge-gain">Lean Muscle Gain</span>
                <button onclick="promptLogin('vaibhav', 'vaibhav.html')" class="btn btn-gain" style="width:100%; border:none; margin-top:20px; cursor:pointer;">Authenticate Profile</button>
            </div>

            <!-- Akash Card -->
            <div class="profile-card cutting">
                <h2>Akash</h2>
                <span class="badge badge-loss">Fat Loss & Fitness</span>
                <button onclick="promptLogin('akash', 'akash.html')" class="btn btn-loss" style="width:100%; border:none; margin-top:20px; cursor:pointer;">Authenticate Profile</button>
            </div>

            <!-- Shalini Card -->
            <div class="profile-card shalini">
                <h2>Shalini</h2>
                <span class="badge badge-shalini">Fat Loss & Core Rehab</span>
                <button onclick="promptLogin('shalini', 'shalini.html')" class="btn btn-shalini" style="width:100%; border:none; margin-top:20px; cursor:pointer;">Authenticate Profile</button>
            </div>
        </div>
    </div>

    <!-- Hidden Authentication Modal Window -->
    <div id="authModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.9); align-items:center; justify-content:center; z-index:999;">
        <div style="background:#1e293b; padding:30px; border-radius:12px; border:1px solid #334155; max-width:400px; width:90%; text-align:center;">
            <h3 id="modalUser" style="margin-top:0; text-transform:capitalize; font-size:1.4rem;">Profile Login</h3>
            <p style="color:#94a3b8; font-size:0.9rem; margin-bottom:20px;">Enter the secure decryption passphrase below.</p>
            <input type="password" id="passkeyInput" placeholder="Enter Security Pin/Password" style="width:100%; padding:12px; background:#0f172a; border:1px solid #334155; color:white; border-radius:6px; box-sizing:border-box; margin-bottom:15px; font-size:1rem;">
            <div style="display:flex; gap:10px; justify-content:center;">
                <button onclick="closeModal()" style="background:#475569; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:600;">Cancel</button>
                <button onclick="verifyPasskey()" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:600;">Verify Code</button>
            </div>
        </div>
    </div>
    <script>
        // High-reliability look-up table for profile passkeys.
        // You can modify these directly to any custom passwords you want!
        const SECURITY_TABLE = {
            vaibhav: "vaibhav123",
            akash: "akash123",
            shalini: "shalini123"
        };
    
        let activeTargetUser = '';
        let activeTargetUrl = '';
    
        function promptLogin(username, redirectUrl) {
            activeTargetUser = username;
            activeTargetUrl = redirectUrl;
            document.getElementById('modalUser').innerText = username.toUpperCase() + " - Access Verification";
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('passkeyInput').focus();
        }
    
        function closeModal() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('passkeyInput').value = '';
        }
    
        function verifyPasskey() {
            // .trim() automatically removes accidental spaces from mobile inputs
            const inputRaw = document.getElementById('passkeyInput').value.trim();
    
            if (inputRaw === SECURITY_TABLE[activeTargetUser]) {
                // Grant authorization clearance via temporary session storage keys
                sessionStorage.setItem('auth_' + activeTargetUser, 'authorized_clearance_granted');
                window.location.href = activeTargetUrl;
            } else {
                alert("Invalid security authorization access key entry. Try again.");
                document.getElementById('passkeyInput').value = '';
            }
        }
    
        // Allow pressing the Enter key on a keyboard to submit the login modal instantly
        document.getElementById('passkeyInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') verifyPasskey();
        });
    </script>
</body>
</html>
